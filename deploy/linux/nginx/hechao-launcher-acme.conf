server {
    listen 80;
    listen [::]:80;
    server_name launcher-api.hechao.world admin.hechao.world;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/hechao-acme;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}
