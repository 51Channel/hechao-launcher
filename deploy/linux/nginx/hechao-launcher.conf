server {
    listen 80;
    listen [::]:80;
    server_name launcher-api.hechao.world admin.hechao.world;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/hechao-acme;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 308 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name launcher-api.hechao.world;

    ssl_certificate /etc/nginx/ssl/hechao-launcher/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/hechao-launcher/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:hechao_launcher_tls:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    client_max_body_size 10m;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Request-ID $request_id;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.hechao.world;

    ssl_certificate /etc/nginx/ssl/hechao-launcher/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/hechao-launcher/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:hechao_launcher_tls:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;

    location / {
        default_type application/json;
        return 404 '{"error":"admin_console_not_deployed"}';
    }
}
